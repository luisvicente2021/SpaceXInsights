name: iOS Basic Workflow

on: push

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Welcome message
        run: echo "🚀 Bienvenido a GitHub Actions en iOS"

      - name: Show macOS info
        run: sw_vers

      - name: Show Xcode version
        run: xcodebuild -version